<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<style>
body {
  font-family: 'Cairo', sans-serif;
  margin: 0;
  background: #f5f7fa;
  direction: rtl;
}

.header {
  background: #007bff;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
}

.container {
  padding: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

th {
  background: #007bff;
  color: white;
}

tr:hover {
  background: #f1f1f1;
}

.loading {
  text-align: center;
  padding: 15px;
  color: gray;
}
</style>

</head>

<body>

<div class="header">
  📊 لوحة التحكم - الطلاب المسجلين
</div>

<div class="container">

  <table id="dataTable">
    <tr>
      <th>🆔</th>
      <th>👦 الاسم</th>
      <th>🎂 العمر</th>
      <th>📱 الهاتف</th>
      <th>📚 الدورة</th>
      <th>📅 التاريخ</th>
    </tr>
  </table>

  <div class="loading" id="loading">⏳ جاري تحميل البيانات...</div>

</div>

<script>

const sheetURL = "https://script.google.com/macros/s/AKfycbxYCJOlTOjlWJsruTTsUGrKutimQXzyED5utioIwiHCN2vSpVacS8HHsxb4oWJ7RvgjMA/exec";

async function loadData() {
  try {

    const res = await fetch(sheetURL);

    if (!res.ok) {
      throw new Error("HTTP ERROR");
    }

    const text = await res.text();

    const data = JSON.parse(text);

    document.getElementById("loading").style.display = "none";

    const table = document.getElementById("dataTable");

    if (!Array.isArray(data) || data.length === 0) {
      table.innerHTML += `
        <tr>
          <td colspan="6">⚠️ لا توجد بيانات بعد</td>
        </tr>
      `;
      return;
    }

    data.forEach(row => {

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${row.id || ""}</td>
        <td>${row.name || ""}</td>
        <td>${row.age || ""}</td>
        <td>${row.phone || ""}</td>
        <td>${row.course || ""}</td>
        <td>${row.date || ""}</td>
      `;

      table.appendChild(tr);
    });

  } catch (err) {
    console.log(err);
    document.getElementById("loading").innerHTML =
      "❌ خطأ في الاتصال بالسيرفر أو البيانات";
  }
}

loadData();

</script>

</body>
</html>
