<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<style>
body {
  font-family: 'Cairo', sans-serif;
  margin: 0;
  background: #f5f7fa;
  direction: rtl;
}

.header {
  background: #007bff;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
  position: relative;
}

.logout-btn {
  position: absolute;
  left: 15px;
  top: 15px;
  background: #dc3545;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.container { padding: 20px; }

.count { margin-bottom: 15px; font-weight: bold; }

#total {
  cursor: pointer;
  color: #007bff;
}

.badges {
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.badge {
  background: #007bff;
  color: white;
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
}

.tools {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

.tools input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  flex: 1;
}

.tools button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
}

.add { background: #28a745; }
.edit { background: #ffc107; color: black; }
.delete { background: #dc3545; }
.excel { background: #17a2b8; }

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

th {
  background: #007bff;
  color: white;
}

.selected { background: #d1ecf1 !important; }

.loading {
  text-align: center;
  padding: 15px;
  color: gray;
}
</style>
</head>

<body>

<div class="header">
  📊 لوحة التحكم أكاديمية وضاح للعلوم
  <button class="logout-btn" onclick="logout()">🚪 خروج</button>
</div>
 
<div class="container">

  <div class="count">
    <div id="total">👥 عدد المسجلين: 0 (اضغط للكل)</div>
    <div class="badges" id="coursesStats"></div>
  </div>

  <div class="tools">
    <input type="text" id="search" placeholder="🔍 بحث بالاسم أو الرقم ID">

    <button class="add" onclick="addStudent()">➕ إضافة</button>
    <button class="edit" onclick="editStudent()">✏️ تعديل</button>
    <button class="delete" onclick="deleteStudent()">🗑️ حذف</button>

    <div class="tools"><button class="excel" onclick="runAI()">🧠 تحليل ذكي</button></div>
  </div>

  <table id="dataTable"></table>

  <div class="loading" id="loading">⏳ جاري تحميل البيانات...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>

const sheetURL = "https://script.google.com/macros/s/AKfycbypM94eQdFgV8zOYvvzg52I1bNFfR84hPr4jFtKTlIPT11Lkbloj-Q3eWfzHmATVlBMWw/exec";

let allData = [];
let selectedRow = null;
let currentFilter = "all";

/* حماية */
if (!localStorage.getItem("role")) {
  window.location.href = "index.html";
}

function logout() {
  localStorage.removeItem("role");
  window.location.href = "index.html";
}

/* normalize قوي */
function normalizeCourse(course) {
  if (!course) return "unknown";

  return course
    .toString()
    .toLowerCase()
    .replace(/[\s🎮🤖🐍🧠]/g, "")
    .trim();
}

/* تحميل */
async function loadData() {
  const res = await fetch(sheetURL);
  const data = await res.json();

  document.getElementById("loading").style.display = "none";

  allData = data;

  updateStats(data);
  renderTable(data);
}

/* 🔥 الإحصائيات + الفلترة */
function updateStats(data) {

  document.getElementById("total").innerText =
    "👥 عدد المسجلين: " + data.length + " (اضغط للكل)";

  let counts = {};

  allData.forEach(row => {
    let key = normalizeCourse(row.course);
    counts[key] = (counts[key] || 0) + 1;
  });

  let container = document.getElementById("coursesStats");
  container.innerHTML = "";

  // زر الكل
  let allBtn = document.createElement("div");
  allBtn.className = "badge";
  allBtn.innerText = "📊 الكل";
  allBtn.onclick = () => {
    currentFilter = "all";
    renderTable(allData);
    updateStats(allData);
  };
  container.appendChild(allBtn);

  Object.keys(counts).forEach(k => {

    let badge = document.createElement("div");
    badge.className = "badge";
    badge.innerText = `${k} (${counts[k]})`;

    badge.onclick = () => {
      currentFilter = k;
      let filtered = allData.filter(x => normalizeCourse(x.course) === k);
      renderTable(filtered);
      document.getElementById("total").innerText =
        "👥 عدد المسجلين: " + filtered.length + " (اضغط للكل)";
    };

    container.appendChild(badge);
  });

  // الضغط على العدد يرجع الكل
  document.getElementById("total").onclick = () => {
    currentFilter = "all";
    renderTable(allData);
    updateStats(allData);
  };
}

/* الجدول */
function renderTable(data) {

  const table = document.getElementById("dataTable");

  table.innerHTML = `
    <tr>
      <th>🆔</th>
      <th>👦 الاسم</th>
      <th>🎂 العمر</th>
      <th>📱 الهاتف</th>
      <th>📚 الدورة</th>
      <th>📅 التاريخ</th>
    </tr>
  `;

  data.forEach(row => {

    const tr = document.createElement("tr");

    tr.onclick = () => {
      document.querySelectorAll("tr").forEach(r => r.classList.remove("selected"));
      tr.classList.add("selected");
      selectedRow = row;
    };

    tr.innerHTML = `
      <td>${row.id || ""}</td>
      <td>👦 ${row.name || ""}</td>
      <td>🎂 ${row.age || ""}</td>
      <td>📱 ${row.phone || ""}</td>
      <td>📚 ${row.course || ""}</td>
      <td>${row.date || ""}</td>
    `;

    table.appendChild(tr);
  });
}

function suggestGroups(data){

  let courses = {};

  data.forEach(x=>{
    let c = normalizeCourse(x.course);
    courses[c] = (courses[c]||0)+1;
  });

  for(let c in courses){
    let n = courses[c];

    if(n > 10){
      console.log(`⚠️ ${c}: اقسم إلى مجموعتين`);
    } else if(n < 5){
      console.log(`💡 ${c}: يمكن دمجه مع دورة أخرى`);
    } else {
      console.log(`✅ ${c}: عدد مناسب`);
    }
  }
}



  
/* البحث */
document.getElementById("search").addEventListener("input", function() {

  let val = this.value.toLowerCase();

  let filtered = allData.filter(r =>
    (r.name && r.name.toLowerCase().includes(val)) ||
    (r.id && r.id.toLowerCase().includes(val))
  );

  renderTable(filtered);
});

/* Excel */
function exportAll() {
  let wb = XLSX.utils.json_to_book(allData, {sheet: "All"});
  XLSX.writeFile(wb, "students.xlsx");
}

function exportByCourse() {

  let courses = [...new Set(allData.map(x => x.course).filter(Boolean))];

  let course = prompt("اكتب اسم الدورة:\n" + courses.join("\n"));

  if (!course) return;

  let filtered = allData.filter(x => normalizeCourse(x.course) === normalizeCourse(course));

  if (filtered.length === 0) {
    alert("لا يوجد بيانات");
    return;
  }

  let wb = XLSX.utils.json_to_book(filtered, {sheet: "course"});
  XLSX.writeFile(wb, course + ".xlsx");
}

/* CRUD */
function addStudent() {
  let name = prompt("اسم الطفل:");
  let age = prompt("العمر:");
  let phone = prompt("الهاتف:");
  let course = prompt("الدورة:");

  fetch(sheetURL, {
    method: "POST",
    body: JSON.stringify({name, age, phone, course})
  }).then(() => setTimeout(loadData, 1000));
}

function editStudent() {
  if (!selectedRow) return alert("اختر طالب");

  let name = prompt("اسم الطفل:", selectedRow.name);
  let age = prompt("العمر:", selectedRow.age);
  let phone = prompt("الهاتف:", selectedRow.phone);
  let course = prompt("الدورة:", selectedRow.course);

  fetch(sheetURL, {
    method: "POST",
    body: JSON.stringify({
      action: "edit",
      id: selectedRow.id,
      name, age, phone, course
    })
  }).then(() => setTimeout(loadData, 1000));
}

function deleteStudent() {
  if (!selectedRow) return alert("اختر طالب");

  if (!confirm("هل تريد الحذف؟")) return;

  fetch(sheetURL, {
    method: "POST",
    body: JSON.stringify({
      action: "delete",
      id: selectedRow.id
    })
  }).then(() => setTimeout(loadData, 1000));
}

loadData();


/* =========================
   🧠 AI SMART ANALYSIS
========================= */
function runAI(){

  try{

    if(!allData || allData.length === 0){
      alert("لا توجد بيانات");
      return;
    }

    let courses = {};

    /* تجميع حسب الدورة */
    allData.forEach(x=>{
      let key = normalizeCourse(x.course);
      if(!courses[key]) courses[key] = [];
      courses[key].push(x);
    });

    let message = "🧠 توزيع ذكي حسب العمر:\n\n";

    Object.keys(courses).forEach(c=>{

      let students = courses[c].map(s => ({
        ...s,
        age: parseInt(s.age) || 0
      }));

      let label = courseLabel(c);

      message += `📚 ${label} (${students.length} طالب)\n`;

      /* 🔥 ترتيب حسب العمر */
      students.sort((a,b)=> b.age - a.age);

      let groupA = [];
      let groupB = [];

      /* 🔥 توزيع متوازن */
      students.forEach((s,i)=>{
        if(i % 2 === 0){
          groupA.push(s);
        } else {
          groupB.push(s);
        }
      });

      /* عرض */
      if(students.length >= 6){

        message += `👥 Group A (${groupA.length}):\n`;
        message += groupA.map(s => `${s.name}(${s.age})`).join("، ") + "\n";

        message += `👥 Group B (${groupB.length}):\n`;
        message += groupB.map(s => `${s.name}(${s.age})`).join("، ") + "\n";

      } else {

        message += `👥 مجموعة واحدة:\n`;
        message += students.map(s => `${s.name}(${s.age})`).join("، ") + "\n";

      }

      message += "----------------------\n";

    });

    alert(message);

  }catch(e){
    console.error(e);
    alert("❌ خطأ في AI");
  }
}




  

/* 🔥 حل المشكل: إضافة courseLabel */
function courseLabel(key) {
  const map = {
    "scratch": "Scratch",
    "python": "Python",
    "روبوتيك": "روبوتيك",
    "ذكاءاصطناعي": "ذكاء اصطناعي",
    "ai": "ذكاء اصطناعي"
  };

  return map[key] || key;
}


<div class="signature">
    <h4>برمجة وتصميم: نذير وضاح</h4>
  </div>
  
  
</script>

</body>
</html>
