<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<style>
body {
  font-family: 'Cairo', sans-serif;
  background: linear-gradient(135deg, #007bff, #00c6ff);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  direction: rtl;
}

.login-box {
  background: white;
  padding: 25px;
  border-radius: 15px;
  width: 300px;
  text-align: center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  background: #007bff;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.error {
  color: red;
  margin-top: 10px;
}

.role {
  margin-top: 10px;
  font-size: 13px;
  color: gray;
}

/* تذكرني */
.remember {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  font-size: 14px;
  margin: 5px 0;
}
</style>

</head>

<body>

<div class="login-box">
  <h2>🔐 دخول الإدارة</h2>

  <input type="text" id="username" placeholder="اسم المستخدم">
  <input type="password" id="password" placeholder="كلمة المرور">

  <!-- ✅ تذكرني -->
  <div class="remember">
    <input type="checkbox" id="remember">
    <label for="remember">تذكرني</label>
  </div>

  <button onclick="login()">دخول</button>

  <div class="error" id="errorMsg"></div>
  <div class="role" id="roleMsg"></div>
</div>

<script>

/* 🔥 دخول تلقائي إذا كان محفوظ */
window.onload = function() {

  let savedUser = localStorage.getItem("savedUser");
  let savedPass = localStorage.getItem("savedPass");

  if(savedUser && savedPass) {

    document.getElementById("username").value = savedUser;
    document.getElementById("password").value = savedPass;
    document.getElementById("remember").checked = true;

    // دخول مباشر
    login();
  }
}

function login() {

  let user = document.getElementById("username").value.trim();
  let pass = document.getElementById("password").value.trim();
  let remember = document.getElementById("remember").checked;

  // 👑 المدير الرئيسي
  if(user === "admin" && pass === "ridan8484") {

    localStorage.setItem("role", "super_admin");

    if(remember){
      localStorage.setItem("savedUser", user);
      localStorage.setItem("savedPass", pass);
    } else {
      localStorage.removeItem("savedUser");
      localStorage.removeItem("savedPass");
    }

    document.getElementById("roleMsg").innerText = "👑 دخول كمدير رئيسي";

    setTimeout(() => {
      window.location.href = "home.html";
    }, 800);

    return;
  }

  // 👨‍💼 مدير
  if(user === "admin" && pass === "admin") {

    localStorage.setItem("role", "admin");

    if(remember){
      localStorage.setItem("savedUser", user);
      localStorage.setItem("savedPass", pass);
    } else {
      localStorage.removeItem("savedUser");
      localStorage.removeItem("savedPass");
    }

    document.getElementById("roleMsg").innerText = "👨‍💼 دخول كمدير";

    setTimeout(() => {
      window.location.href = "home.html";
    }, 800);

    return;
  }

  // ❌ خطأ
  document.getElementById("errorMsg").innerText = "❌ معلومات خاطئة";
}

</script>

</body>
</html>
