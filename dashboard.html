<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<style>
body {
  font-family: 'Cairo', sans-serif;
  margin: 0;
  background: #f5f7fa;
  direction: rtl;
}

.header {
  background: #007bff;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
  position: relative;
}

.logout-btn {
  position: absolute;
  left: 15px;
  top: 15px;
  background: #dc3545;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.container { padding: 20px; }

.count { margin-bottom: 15px; font-weight: bold; }

#total {
  cursor: pointer;
  color: #007bff;
}

.badges {
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.badge {
  background: #007bff;
  color: white;
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
}

.tools {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

.tools input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  flex: 1;
}

.tools button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
}

.add { background: #28a745; }
.edit { background: #ffc107; color: black; }
.delete { background: #dc3545; }
.excel { background: #17a2b8; }

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

th {
  background: #007bff;
  color: white;
}

.selected { background: #d1ecf1 !important; }

/* ألوان المجموعات */
.group-A { background:#d4edda; }
.group-B { background:#fff3cd; }
.group-C { background:#f8d7da; }

.loading {
  text-align: center;
  padding: 15px;
  color: gray;
}
</style>
</head>

<body>

<div class="header">
  📊 لوحة التحكم أكاديمية وضاح للعلوم
  <button class="logout-btn" onclick="logout()">🚪 عودة</button>
</div>
 
<div class="container">

  <div class="count">
    <div id="total">👥 عدد المسجلين: 0 (اضغط للكل)</div>
    <div class="badges" id="coursesStats"></div>
  </div>

  <div class="tools">
    <input type="text" id="search" placeholder="🔍 بحث بالاسم أو الرقم ID">

    <button class="add" onclick="addStudent()">➕ إضافة</button>
    <button class="edit" onclick="editStudent()">✏️ تعديل</button>
    <button class="delete" onclick="deleteStudent()">🗑️ حذف</button>

    <button class="excel" onclick="runAI()">🧠 تحليل ذكي</button>
    <button class="excel" onclick="exportGroups()">📊 Excel المجموعات</button>
  </div>

  <table id="dataTable"></table>

  <div class="loading" id="loading">⏳ جاري تحميل البيانات...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>

const sheetURL = "https://script.google.com/macros/s/AKfycbypM94eQdFgV8zOYvvzg52I1bNFfR84hPr4jFtKTlIPT11Lkbloj-Q3eWfzHmATVlBMWw/exec";

let allData = [];
let selectedRow = null;
let currentFilter = "all";
let groupMode = false;
let groupMap = {};

/* حماية */
if (!localStorage.getItem("role")) {
  window.location.href = "index.html";
}

function logout() {
  localStorage.removeItem("role");
  window.location.href = "home.html";
}

/* normalize */
function normalizeCourse(course) {
  return (course||"").toString().toLowerCase().replace(/[\s🎮🤖🐍🧠]/g,"").trim();
}

/* تحميل */
async function loadData() {
  const res = await fetch(sheetURL);
  const data = await res.json();

  document.getElementById("loading").style.display = "none";

  allData = data;
  updateStats(data);
  renderTable(data);
}

/* الإحصائيات */
function updateStats(data) {

  document.getElementById("total").innerText =
    "👥 عدد المسجلين: " + data.length + " (اضغط للكل)";

  let counts = {};

  allData.forEach(row => {
    let key = normalizeCourse(row.course);
    counts[key] = (counts[key] || 0) + 1;
  });

  let container = document.getElementById("coursesStats");
  container.innerHTML = "";

  let allBtn = document.createElement("div");
  allBtn.className = "badge";
  allBtn.innerText = "📊 الكل";
  allBtn.onclick = () => {
    currentFilter = "all";
    renderTable(allData);
    updateStats(allData);
  };
  container.appendChild(allBtn);

  Object.keys(counts).forEach(k => {
    let badge = document.createElement("div");
    badge.className = "badge";
    badge.innerText = `${k} (${counts[k]})`;

    badge.onclick = () => {
      let filtered = allData.filter(x => normalizeCourse(x.course) === k);
      renderTable(filtered);
    };

    container.appendChild(badge);
  });

  document.getElementById("total").onclick = () => {
    renderTable(allData);
    updateStats(allData);
  };
}

/* الجدول */
function renderTable(data) {

  const table = document.getElementById("dataTable");

  table.innerHTML = `
<tr>
  <th>🆔</th>
  <th>👦 الاسم</th>
  <th>🎂 العمر</th>
  <th>📱 الهاتف</th>
  <th>📚 الدورة</th>
  <th>👥 المجموعة</th>
  <th>📅 التاريخ</th>
</tr>`;

  data.forEach(row => {

    let group = groupMode ? (groupMap[row.id] || "-") : "-";

    const tr = document.createElement("tr");

    if(group !== "-"){
      tr.classList.add("group-" + group);
    }

    tr.onclick = () => {
      document.querySelectorAll("tr").forEach(r => r.classList.remove("selected"));
      tr.classList.add("selected");
      selectedRow = row;
    };

    tr.innerHTML = `
      <td>${row.id || ""}</td>
      <td>👦 ${row.name || ""}</td>
      <td>🎂 ${row.age || ""}</td>
      <td>📱 ${row.phone || ""}</td>
      <td>${row.course || ""}</td>
      <td>${group}</td>
      <td>${row.date || ""}</td>
    `;

    table.appendChild(tr);
  });
}

/* AI تقسيم احترافي حسب العمر */
function runAI(){

  groupMode = true;
  groupMap = {};

  let students = [...allData].map(s => ({
    ...s,
    age: parseInt(s.age)||0
  }));

  // ترتيب حسب العمر
  students.sort((a,b)=> a.age - b.age);

  let groupSize = 10;
  let groupNames = ["A","B","C","D","E"];

  students.forEach((s,i)=>{
    let groupIndex = Math.floor(i / groupSize);
    let g = groupNames[groupIndex] || "Z";
    groupMap[s.id] = g;
  });

  // ترتيب الجدول حسب المجموعة
  let sorted = [...students].sort((a,b)=>{
    return (groupMap[a.id]||"").localeCompare(groupMap[b.id]||"");
  });

  renderTable(sorted);

  alert("✅ تم التقسيم حسب العمر + ترتيب المجموعات");
}

/* Excel المجموعات */
function exportGroups(){

  if(!groupMode){
    alert("قم بتشغيل التحليل الذكي أولاً");
    return;
  }

  let exportData = allData.map(x=>({
    id:x.id,
    name:x.name,
    age:x.age,
    phone:x.phone,
    course:x.course,
    group:groupMap[x.id] || "-"
  }));

  let wb = XLSX.utils.json_to_book(exportData);
  XLSX.writeFile(wb,"groups.xlsx");
}

/* البحث */
document.getElementById("search").addEventListener("input", function() {
  let val = this.value.toLowerCase();

  let filtered = allData.filter(r =>
    (r.name && r.name.toLowerCase().includes(val)) ||
    (r.id && r.id.toLowerCase().includes(val))
  );

  renderTable(filtered);
});

/* CRUD (لم يتغير) */
function addStudent() {
  let name = prompt("اسم الطفل:");
  let age = prompt("العمر:");
  let phone = prompt("الهاتف:");
  let course = prompt("الدورة:");

  fetch(sheetURL, {
    method: "POST",
    body: JSON.stringify({name, age, phone, course})
  }).then(() => setTimeout(loadData, 1000));
}

function editStudent() {
  if (!selectedRow) return alert("اختر طالب");

  let name = prompt("اسم الطفل:", selectedRow.name);
  let age = prompt("العمر:", selectedRow.age);
  let phone = prompt("الهاتف:", selectedRow.phone);
  let course = prompt("الدورة:", selectedRow.course);

  fetch(sheetURL, {
    method: "POST",
    body: JSON.stringify({
      action: "edit",
      id: selectedRow.id,
      name, age, phone, course
    })
  }).then(() => setTimeout(loadData, 1000));
}

function deleteStudent() {
  if (!selectedRow) return alert("اختر طالب");

  if (!confirm("هل تريد الحذف؟")) return;

  fetch(sheetURL, {
    method: "POST",
    body: JSON.stringify({
      action: "delete",
      id: selectedRow.id
    })
  }).then(() => setTimeout(loadData, 1000));
}

loadData();

</script>

</body>
</html>
