<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<style>
body {
  font-family: 'Cairo', sans-serif;
  margin: 0;
  background: #f5f7fa;
  direction: rtl;
}

.header {
  background: #007bff;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 20px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

th {
  background: #007bff;
  color: white;
}

tr:hover {
  background: #f1f1f1;
}
</style>

</head>

<body>

<div class="header">
  📊 لوحة التحكم - الطلاب المسجلين
</div>

<div class="container">

  <table id="dataTable">
    <tr>
      <th>🆔</th>
      <th>👦 الاسم</th>
      <th>🎂 العمر</th>
      <th>📱 الهاتف</th>
      <th>📚 الدورة</th>
      <th>📅 التاريخ</th>
    </tr>
  </table>

</div>

<script>

// ضع هنا رابط Google Sheets JSON
let sheetURL = "https://script.google.com/macros/s/AKfycbxTGELHHIGsGQno1bxZmh5JELRm5QturBpEi9NlvyF6aOGSKUUTcDIC0m9KT9K3PeBUPw/exec";

fetch(sheetURL)
.then(res => res.json())
.then(data => {

  let table = document.getElementById("dataTable");

  data.forEach(row => {
    let tr = `
      <tr>
        <td>${row.id}</td>
        <td>${row.name}</td>
        <td>${row.age}</td>
        <td>${row.phone}</td>
        <td>${row.course}</td>
        <td>${row.date}</td>
      </tr>
    `;
    table.innerHTML += tr;
  });

});

</script>

</body>
</html>
