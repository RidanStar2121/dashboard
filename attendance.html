<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الحضور الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; margin: 0; background: #f5f7fa; direction: rtl; }
        .header { background: #007bff; color: white; padding: 15px; text-align: center; position: relative; font-size: 18px; }
        .nav-btn { position: absolute; left: 15px; top: 15px; background: rgba(255,255,255,0.2); border: none; padding: 8px 15px; border-radius: 8px; color: white; cursor: pointer; }
        
        .container { padding: 20px; max-width: 1200px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }

        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); position: relative; }
        h3 { margin-top: 0; color: #007bff; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; font-size: 16px; }

        #reader { width: 100%; border-radius: 10px; overflow: hidden; border: 2px solid #eee; }
        
        .search-box-container { position: relative; margin-bottom: 15px; }
        .search-input { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #007bff; box-sizing: border-box; font-family: 'Cairo'; background: #f0f7ff; }
        .search-suggestions { 
            position: absolute; top: 100%; left: 0; right: 0; 
            background: white; border: 1px solid #ddd; border-radius: 0 0 8px 8px;
            z-index: 1000; max-height: 200px; overflow-y: auto; display: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .suggestion-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
        .suggestion-item:hover { background: #e7f3ff; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
        input, select { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Cairo'; box-sizing: border-box; }
        
        .buttons-group { display: flex; gap: 10px; }
        .btn-save { background: #28a745; color: white; flex: 2; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-cancel { background: #dc3545; color: white; flex: 1; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; display: none; }
        
        .full-width { grid-column: 1 / -1; }
        .filters { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; background: #e9ecef; padding: 15px; border-radius: 10px; align-items: center; }
        .filters button { background: white; border: 1px solid #007bff; color: #007bff; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        .filters button.active { background: #007bff; color: white; }

        .table-container { background: white; border-radius: 10px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 850px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #eee; font-size: 13px; }
        thead { background: #007bff; color: white; }
        
        .status-present { color: #28a745; font-weight: bold; }
        .status-absent { color: #dc3545; font-weight: bold; }
        .loading-overlay { display: none; text-align: center; padding: 20px; color: #666; }
        .badge-group { background: #e6f4ea; color: #137333; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; display: inline-block; }
        
        .action-btn { border: none; background: none; cursor: pointer; font-size: 15px; padding: 2px 6px; border-radius: 4px; transition: 0.2s; }
        .btn-edit-row { color: #ffc107; } .btn-edit-row:hover { background: #fff9e6; }
        .btn-delete-row { color: #dc3545; } .btn-delete-row:hover { background: #fff5f5; }
    </style>
</head>
<body>

<div class="header">
    👥 نظام تتبع الحضور الذكي والربط التلقائي للأفواج
    <button class="nav-btn" onclick="location.href='home.html'">🏠 الرئيسية</button>
</div>

<div class="container">
    
    <div class="card">
        <h3>🎥 المسح الذكي (QR Code)</h3>
        <div id="reader"></div>
        <p id="scanStatus" style="text-align: center; font-weight: bold; margin-top: 10px; color: #666;">في انتظار قراءة الكود...</p>
    </div>

    <div class="card">
        <h3 id="formTitle">📝 تسجيل حضور / غياب جديد</h3>
        
        <input type="hidden" id="rowId">

        <div class="search-box-container">
            <label>🔍 ابحث عن اسم الطالب أو معرفه:</label>
            <input type="text" id="quickSearch" class="search-input" placeholder="اكتب اسم الطالب هنا للمقاطعة الفورية..." oninput="handleQuickSearch()">
            <div id="suggestions" class="search-suggestions"></div>
        </div>

        <div class="form-group" style="display: none;">
            <select id="studentSelect">
                <option value="">-- اختر الطالب --</option>
            </select>
        </div>

        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>الطالب المستهدف:</label>
                <input type="text" id="displayStudentName" readonly placeholder="في انتظار الاختيار..." style="background: #f8f9fa; font-weight: bold;">
            </div>
            <div>
                <label>رقم المعرف (ID):</label>
                <input type="text" id="studentId" readonly placeholder="ID" style="background: #f8f9fa;">
            </div>
        </div>

        <div class="form-group">
            <label style="color: #007bff;">👥 الفوج المستهدف (يتعرف عليه النظام تلقائياً):</label>
            <select id="groupSelect" style="border: 2px solid #28a745; font-weight: bold;">
                <option value="">⏳ جاري تحميل بيانات الأفواج والمجموعات...</option>
            </select>
        </div>

        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>
                <label>التاريخ:</label>
                <input type="date" id="attDate">
            </div>
            <div>
                <label>الحالة:</label>
                <select id="status">
                    <option value="حاضر">✅ حاضر</option>
                    <option value="غائب">❌ غائب</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>ملاحظات إضافية:</label>
            <input type="text" id="note" placeholder="ملاحظات حول الحصة الحالية...">
        </div>
        
        <div class="buttons-group">
            <button class="btn-save" id="saveBtn" onclick="submitAttendance()">💾 تأكيد الحفظ في السحابة</button>
            <button class="btn-cancel" id="cancelBtn" onclick="resetForm()">❌ إلغاء</button>
        </div>
    </div>

    <div class="card full-width">
        <h3>📅 سجل عمليات الحضور التاريخي</h3>
        <div class="filters">
            <strong>تصفية الحصص:</strong>
            <button onclick="filterRecords('all')" class="active" id="btnAll">عرض الكل</button>
            <button onclick="filterRecords('day')" id="btnDay">اليوم الحصري</button>
            <button onclick="filterRecords('month')" id="btnMonth">الشهر الحالي</button>
            <div style="margin-right: auto;">
                <input type="text" id="tableSearch" placeholder="🔍 بحث سريع في السجل..." style="width: 200px; padding: 5px;">
            </div>
        </div>

        <div id="loader" class="loading-overlay">⏳ جاري جلب البيانات ...</div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>التاريخ</th>
                        <th>ID</th>
                        <th>اسم الطالب</th>
                        <th>الفوج المستهدف والبيانات</th>
                        <th>الحالة</th>
                        <th>ملاحظات</th>
                        <th style="text-align: center; width: 100px;">إجراءات</th>
                    </tr>
                </thead>
                <tbody id="attBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const sheetURL = "https://script.google.com/macros/s/AKfycbzQpncmEbFRwd3N5nwHS911q5oMyqonKgIJKUqNMvkxKCRwDhFzgg8N-YozLMKiWkZaMg/exec";
    let studentsData = [];
    let groupsData = []; 
    let attendanceHistory = [];

    window.onload = async () => {
        document.getElementById('attDate').valueAsDate = new Date();
        await loadInitialData();
        startScanner();
    };

    async function loadInitialData() {
        try {
            const sRes = await fetch(`${sheetURL}?action=get&sheet=students`);
            studentsData = await sRes.json();
            
            const select = document.getElementById('studentSelect');
            select.innerHTML = '<option value="">-- اختر الطالب --</option>';
            studentsData.forEach(s => {
                let opt = document.createElement('option');
                opt.value = s.id;
                opt.textContent = s.name;
                select.appendChild(opt);
            });

            const gRes = await fetch(`${sheetURL}?action=get&sheet=Group`);
            groupsData = await gRes.json();
            populateAllGroupsInitially();

            await fetchAttendanceHistory();
        } catch (e) { console.error("Error loading initial data", e); }
    }

    function populateAllGroupsInitially() {
        const gSelect = document.getElementById('groupSelect');
        gSelect.innerHTML = '<option value="">-- اختر الفوج يدوياً أو ابحث عن طالب للربط التلقائي --</option>';
        if(groupsData.length === 0) {
            gSelect.innerHTML = '<option value="">⚠️ لا توجد أفواج في شيت Group</option>';
            return;
        }
        groupsData.forEach(g => {
            let opt = document.createElement('option');
            let groupText = `${g.groupName || 'فوج غير مسمى'} [${g.subject || 'بدون مادة'}] - أ.${g.teacher || 'غير مححدد'}`;
            opt.value = groupText;
            opt.textContent = groupText;
            gSelect.appendChild(opt);
        });
    }

    function handleQuickSearch() {
        const query = document.getElementById('quickSearch').value.toLowerCase();
        const container = document.getElementById('suggestions');
        container.innerHTML = "";
        
        if (query.length < 1) {
            container.style.display = "none";
            return;
        }

        const matches = studentsData.filter(s => s.name.toLowerCase().includes(query) || s.id.toString().includes(query));

        if (matches.length > 0) {
            container.style.display = "block";
            matches.forEach(match => {
                const div = document.createElement('div');
                div.className = "suggestion-item";
                div.innerHTML = `<strong>${match.name}</strong> <small>(ID: ${match.id})</small>`;
                div.onclick = () => selectStudent(match);
                container.appendChild(div);
            });
        } else {
            container.style.display = "none";
        }
    }

    function selectStudent(student) {
        document.getElementById('displayStudentName').value = student.name;
        document.getElementById('studentId').value = student.id;
        document.getElementById('studentSelect').value = student.id; 
        document.getElementById('quickSearch').value = student.name;
        document.getElementById('suggestions').style.display = "none";

        const gSelect = document.getElementById('groupSelect');
        
        const matchedGroups = groupsData.filter(g => {
            if (g.studentIds) {
                const idsArray = g.studentIds.toString().split(",").map(id => id.trim());
                return idsArray.includes(student.id.toString());
            }
            return false;
        });

        if (matchedGroups.length > 0) {
            gSelect.innerHTML = '';
            matchedGroups.forEach(g => {
                let opt = document.createElement('option');
                let groupText = `${g.groupName} [${g.subject}] - أ.${g.teacher || 'غير محدد'}`;
                opt.value = groupText;
                opt.textContent = groupText;
                gSelect.appendChild(opt);
            });
        } else {
            populateAllGroupsInitially();
            let opt = document.createElement('option');
            opt.value = "";
            opt.textContent = "⚠️ تنبيه: هذا التلميذ لم يتم تسكينه بأي فوج في صفحة الأفواج!";
            opt.selected = true;
            gSelect.prepend(opt);
        }
    }

    async function fetchAttendanceHistory() {
        document.getElementById('loader').style.display = "block";
        try {
            const aRes = await fetch(`${sheetURL}?action=get&sheet=attendance`);
            attendanceHistory = await aRes.json();
            renderTable(attendanceHistory);
        } catch (e) { console.error("Error fetching history", e); }
        document.getElementById('loader').style.display = "none";
    }

    function startScanner() {
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "user" }, { fps: 10, qrbox: 250 }, (decoded) => {
            const student = studentsData.find(s => s.id == decoded || s.name == decoded);
            if(student) selectStudent(student);
            playBeep();
        }).catch(err => console.log("Camera loading..."));
    }

    async function submitAttendance() {
        const btn = document.getElementById('saveBtn');
        const rowId = document.getElementById('rowId').value;
        const sName = document.getElementById('displayStudentName').value;
        const sId = document.getElementById('studentId').value;
        const groupInfo = document.getElementById('groupSelect').value;
        
        if (!sId) return alert("يرجى اختيار طالب أولاً");
        if (!groupInfo || groupInfo.includes("تنبيه") || groupInfo.includes("اختر")) return alert("يرجى اختيار الفوج والمادة المحددة لحفظ الحصة بنجاح");

        const isEdit = rowId !== "";
        const currentStatus = document.getElementById('status').value;
        const currentDate = document.getElementById('attDate').value;

        const payload = {
            action: isEdit ? "editStudent" : "addStudent",
            sheet: "attendance",
            id: isEdit ? rowId : null,
            studentId: sId,
            studentName: sName,
            groupName: groupInfo, 
            date: currentDate,
            status: currentStatus,
            note: document.getElementById('note').value
        };

        btn.disabled = true;
        btn.innerText = "⏳ جاري الإرسال ...";
        try {
            const res = await fetch(sheetURL, { method: "POST", body: JSON.stringify(payload) });
            const result = await res.json();
            if (result.success) {
                alert(isEdit ? "✅ تم تعديل السجل بنجاح!" : "✅ تم تسجيل عملية الحضور بنجاح!");
                
                // 🌟 بداية نظام إشعارات الواتساب التلقائي الذكي 🌟
                // البحث عن بيانات الطالب في المصفوفة لجلب رقم هاتف ولي أمره المكتوب في الشيت
                const studentInfo = studentsData.find(s => s.id == sId);
                // قراءة الرقم (يدعم العمود إذا كان اسمه phone أو parentPhone أو mobile)
                const parentPhone = studentInfo ? (studentInfo.phone || studentInfo.parentPhone || studentInfo.mobile) : null;

                if (parentPhone) {
                    // صياغة نص الرسالة الاحترافي للأكاديمية
                    const emojiStatus = currentStatus === "حاضر" ? "✅ [حضور]" : "❌ [غياب]";
                    const whatsappMessage = `مرحباً بحضرتكم من *أكاديمية وضاح للعلوم* 🏛️\n\n` +
                                            `نحيطكم علماً بالتقرير اليومي للطالب(ة): *${sName}*\n` +
                                            `📅 التاريخ: ${currentDate}\n` +
                                            `📚 الفوج الدراسي: ${groupInfo}\n` +
                                            `🔔 الحالة الإدارية: *${currentStatus}* ${emojiStatus}\n\n` +
                                            `نشكر تعاملك وثقتك في أكاديميتنا الدائمة.`;

                    // تنظيف رقم الهاتف وإزالة أي فراغات أو رموز زائدة لضمان الإرسال الدولي الصحيح
                    const cleanPhone = parentPhone.toString().replace(/[^0-9]/g, '');
                    
                    // فتح رابط الواتساب مجهز بالرقم والنص المشفر تلقائياً للإرسال الفوري
                    const whatsappURL = `https://api.whatsapp.com/send?phone=${cleanPhone}&text=${encodeURIComponent(whatsappMessage)}`;
                    window.open(whatsappURL, '_blank');
                } else {
                    console.log("⚠️ تنبيه: لم يتم إرسال إشعار واتساب لعدم وجود رقم هاتف مسجل لهذا الطالب في شيت الطلاب.");
                }
                // 🌟 نهاية نظام إشعارات الواتساب 🌟

                await fetchAttendanceHistory();
                resetForm();
            } else {
                alert("❌ فشل الحفظ: " + (result.error || "خطأ سيرفر"));
            }
        } catch (e) { alert("خطأ في الاتصال بالخادم"); }
        btn.disabled = false;
        btn.innerText = isEdit ? "💾 حفظ التعديلات" : "💾 تأكيد الحفظ";
    }

    function editAttendanceMode(id) {
        const record = attendanceHistory.find(r => r.id.toString() === id.toString());
        if (!record) return;

        document.getElementById('formTitle').innerHTML = `✏️ تعديل سجل حضور الطالب: ${record.studentName}`;
        document.getElementById('rowId').value = record.id;
        document.getElementById('displayStudentName').value = record.studentName;
        document.getElementById('studentId').value = record.studentId;
        document.getElementById('studentSelect').value = record.studentId;
        document.getElementById('quickSearch').value = record.studentName;
        document.getElementById('attDate').value = record.date;
        document.getElementById('status').value = record.status;
        document.getElementById('note').value = record.note || "";

        const gSelect = document.getElementById('groupSelect');
        const savedGroup = record.groupName || record.group || '';
        gSelect.innerHTML = `<option value="${savedGroup}" selected>${savedGroup}</option>`;
        
        groupsData.forEach(g => {
            let groupText = `${g.groupName || 'فوج غير مسمى'} [${g.subject || 'بدون مادة'}] - أ.${g.teacher || 'غير محدد'}`;
            if (groupText !== savedGroup) {
                let opt = document.createElement('option');
                opt.value = groupText;
                opt.textContent = groupText;
                gSelect.appendChild(opt);
            }
        });

        document.getElementById('cancelBtn').style.display = "inline-flex";
        document.getElementById('saveBtn').innerText = "💾 حفظ التعديلات";
        window.scrollTo({ top: 100, behavior: 'smooth' });
    }

    // الدالة الذكية والمطابقة تماماً لصفحة Group لحذف السجل بدون لمس الـ Apps Script
    // الدالة الذكية والمطابقة تماماً لصفحة Group لحذف السجل بدون لمس الـ Apps Script
   // الدالة الذكية والمطابقة تماماً لصفحة المجموعات الناجحة لحذف السجل سحابياً بشكل صحيح
    async function deleteAttendance(id) {
        if (!confirm("هل أنت متأكد تماماً من حذف سجل الحضور هذا؟ لا يمكن التراجع عن هذا الإجراء.")) return;

        // صياغة الـ Payload المتوافقة تماماً مع شروط الكود السحابي لاستقبال أوامر الحذف
        const payload = {
            action: "deleteStudent", 
            sheet: "attendance",
            id: id
        };

        try {
            const response = await fetch(sheetURL, { 
                method: "POST", 
                body: JSON.stringify(payload) 
            });
            
            const result = await response.json();
            
            if (result.success) {
                alert("🗑️ تم حذف السجل بنجاح وتحديث السحابة.");
                await fetchAttendanceHistory(); // لتحديث جدول الحضور فوراً بعد الحذف الفعلي
            } else {
                alert("❌ فشل عملية الحذف: " + (result.error || "خطأ غير معروف"));
            }
        } catch (e) {
            console.error("خطأ الحذف:", e);
            alert("❌ حدث عطل أثناء الاتصال بالخادم السحابي");
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('attBody');
        tbody.innerHTML = "";
        data.slice().reverse().forEach(r => {
            const statusClass = r.status === "حاضر" ? "status-present" : "status-absent";
            const groupDisplay = r.groupName || r.group || '-';
            
            tbody.innerHTML += `
                <tr>
                    <td>${r.date}</td>
                    <td>${r.studentId}</td>
                    <td>${r.studentName}</td>
                    <td><span class="badge-group">${groupDisplay}</span></td>
                    <td class="${statusClass}">${r.status}</td>
                    <td>${r.note || '-'}</td>
                    <td style="text-align: center;">
                        <button class="action-btn btn-edit-row" onclick="editAttendanceMode('${r.id}')" title="تعديل السجل"><i class="fas fa-edit"></i></button>
                        <button class="action-btn btn-delete-row" onclick="deleteAttendance('${r.id}')" title="حذف السجل"><i class="fas fa-trash-alt"></i></button>
                    </td>
                </tr>
            `;
        });
    }

    function filterRecords(type) {
        const now = new Date();
        const today = now.toISOString().split('T')[0];
        let filtered = attendanceHistory;

        if (type === 'day') {
            filtered = attendanceHistory.filter(r => r.date === today);
        } else if (type === 'month') {
            const currentMonth = now.getMonth();
            const currentYear = now.getFullYear();
            filtered = attendanceHistory.filter(r => {
                const d = new Date(r.date);
                return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
            });
        }
        
        renderTable(filtered);
        document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('active');
    }

    document.getElementById('tableSearch').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase();
        const filtered = attendanceHistory.filter(r => 
            r.studentName.toLowerCase().includes(term) || 
            r.studentId.toString().includes(term) ||
            (r.groupName && r.groupName.toLowerCase().includes(term))
        );
        renderTable(filtered);
    });

    function resetForm() {
        document.getElementById('formTitle').innerHTML = "📝 تسجيل حضور / غياب جديد";
        document.getElementById('rowId').value = "";
        document.getElementById('quickSearch').value = "";
        document.getElementById('displayStudentName').value = "";
        document.getElementById('studentId').value = "";
        document.getElementById('note').value = "";
        document.getElementById('cancelBtn').style.display = "none";
        document.getElementById('saveBtn').innerText = "💾 تأكيد الحفظ في السحابة";
        populateAllGroupsInitially();
        document.getElementById('scanStatus').innerHTML = "في انتظار قراءة الكود...";
    }

    function playBeep() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } catch(e) {}
    }

/* ====================================================
   كود احترافي وجذري لاستقبال بيانات الطالب وتعبئتها تلقائياً
====================================================== */
function autoFillStudentData() {
    const urlParams = new URLSearchParams(window.location.search);
    const studentId = urlParams.get('studentId');
    const studentName = urlParams.get('studentName');

    if (studentId || studentName) {
        // البحث المرن عن الحقول في صفحة الحضور
        let idInput = document.getElementById("studentId") 
                   || document.querySelector("input[name='studentId']")
                   || document.querySelector("input[placeholder*='ID']")
                   || document.querySelector("input[placeholder*='معرف']");

        let nameInput = document.getElementById("studentName") 
                     || document.querySelector("input[name='studentName']")
                     || document.querySelector("input[placeholder*='اسم']");

        if (idInput && studentId) {
            idInput.value = studentId;
            idInput.dispatchEvent(new Event('input', { bubbles: true }));
            idInput.dispatchEvent(new Event('change', { bubbles: true }));
        }
        
        if (nameInput && studentName) {
            nameInput.value = studentName;
            nameInput.dispatchEvent(new Event('input', { bubbles: true }));
            nameInput.dispatchEvent(new Event('change', { bubbles: true }));
        }
    }
}

if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", autoFillStudentData);
} else {
    autoFillStudentData();
}
</script>
