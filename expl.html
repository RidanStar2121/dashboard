<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedotPay</title>
    <style>
        :root {
            --bg-main: #f8fafc;
            --surface: #ffffff;
            --accent-red: #dc2626;
            --accent-red-hover: #b91c1c;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-dark);
        }

        /* حاوية الأندرويد لتبدو كشاشة هاتف حقيقية أمام اللجنة */
        .phone-wrapper {
            width: 100%;
            max-width: 412px;
            height: 100vh;
            max-height: 850px;
            background-color: var(--bg-main);
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 4px solid #ffffff;
            position: relative;
        }

        /* شاشة تسجيل الدخول */
        .screen {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            padding: 30px 24px;
            position: absolute;
            top: 0;
            left: 0;
            background: var(--surface);
            transition: transform 0.4s ease-in-out, opacity 0.3s;
            overflow-y: auto;
        }

        .hidden {
            transform: translateX(100%);
            opacity: 0;
            pointer-events: none;
        }

        .logo-area {
            text-align: center;
            margin-top: 60px;
            margin-bottom: 50px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background-color: var(--accent-red);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 12px;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
        }

        .logo-area h2 {
            font-size: 24px;
            color: var(--text-dark);
            font-weight: 700;
        }

        .logo-area p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            background-color: #f8fafc;
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-dark);
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-red);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }

        .btn-primary {
            background-color: var(--accent-red);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background-color: var(--accent-red-hover);
        }

        /* واجهة التطبيق الرئيسية */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background-color: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: var(--text-dark);
            border: 2px solid var(--accent-red);
        }

        .user-meta h4 {
            font-size: 15px;
            font-weight: 600;
        }

        .user-meta p {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* تصميم بطاقة الفيزا الاحترافية ثلاثية الأبعاد */
        .visa-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 20px;
            padding: 24px;
            color: white;
            position: relative;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.25);
            margin-bottom: 25px;
            overflow: hidden;
        }

        /* لمسة اللون الأحمر على البطاقة لتبدو مثل RedotPay */
        .visa-card::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: rgba(220, 38, 38, 0.15);
            border-radius: 50%;
            filter: blur(20px);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .chip {
            width: 40px;
            height: 30px;
            background: linear-gradient(135deg, #e2e8f0, #94a3b8);
            border-radius: 6px;
        }

        .card-brand {
            font-size: 22px;
            font-weight: bold;
            font-style: italic;
        }

        .card-number {
            font-size: 20px;
            letter-spacing: 3px;
            margin-bottom: 30px;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .card-bottom {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
        }

        .card-bottom strong {
            display: block;
            color: white;
            font-size: 14px;
            margin-top: 4px;
            letter-spacing: 0.5px;
            font-family: sans-serif;
        }

        /* قسم رصيد المحفظة */
        .balance-card {
            background: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 25px;
        }

        .balance-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 6px;
        }

        .balance-val {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* لوحة العمليات السريعة */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .action-icon {
            width: 50px;
            height: 50px;
            background-color: var(--surface);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s;
        }

        .action-item:hover .action-icon {
            border-color: var(--accent-red);
            color: var(--accent-red);
            transform: translateY(-2px);
        }

        .action-item span {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
        }

        /* القائمة السفلية للتنقل (Navigation Bar) لتعزيز مظهر التطبيق */
        .nav-bar {
            margin-top: auto;
            background: var(--surface);
            border-top: 1px solid var(--border-color);
            padding: 12px 10px;
            display: flex;
            justify-content: space-around;
            margin-left: -24px;
            margin-right: -24px;
            margin-bottom: -30px;
        }

        .nav-link {
            text-align: center;
            color: var(--text-muted);
            font-size: 11px;
            text-decoration: none;
            font-weight: 500;
        }

        .nav-link.active {
            color: var(--accent-red);
        }
    </style>
</head>
<body>

<div class="phone-wrapper">

        <div class="nav-bar">

</body>
</html>
