<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<style>
body {
  font-family: 'Cairo', sans-serif;
  margin: 0;
  background: #f5f7fa;
  direction: rtl;
}

.header {
  background: #007bff;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
  position: relative;
}

.logout-btn {
  position: absolute;
  left: 15px;
  top: 15px;
  background: #dc3545;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.container { padding: 20px; }

.count { margin-bottom: 15px; font-weight: bold; }

.badges {
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.badge {
  background: #007bff;
  color: white;
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 13px;
}

.tools {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

.tools input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  flex: 1;
}

.tools button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
}

.add { background: #28a745; }
.edit { background: #ffc107; color: black; }
.delete { background: #dc3545; }
.excel { background: #17a2b8; }

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

th {
  background: #007bff;
  color: white;
}

.selected { background: #d1ecf1 !important; }

.loading {
  text-align: center;
  padding: 15px;
  color: gray;
}
</style>
</head>

<body>

<div class="header">
  📊 لوحة التحكم أكاديمية وضاح للعلوم
  <button class="logout-btn" onclick="logout()">🚪 خروج</button>
</div>

<div class="container">

  <div class="count">
    <div id="total">👥 عدد المسجلين: 0</div>
    <div class="badges" id="coursesStats"></div>
  </div>

  <div class="tools">
    <input type="text" id="search" placeholder="🔍 بحث بالاسم أو الرقم ID">

    <button class="add" onclick="addStudent()">➕ إضافة</button>
    <button class="edit" onclick="editStudent()">✏️ تعديل</button>
    <button class="delete" onclick="deleteStudent()">🗑️ حذف</button>

    <button class="excel" onclick="exportAll()">⬇️ Excel الكل</button>
    <button class="excel" onclick="exportByCourse()">🎯 Excel حسب الدورة</button>
  </div>

  <table id="dataTable">
    <tr>
      <th>🆔</th>
      <th>👦 الاسم</th>
      <th>🎂 العمر</th>
      <th>📱 الهاتف</th>
      <th>📚 الدورة</th>
      <th>📅 التاريخ</th>
    </tr>
  </table>

  <div class="loading" id="loading">⏳ جاري تحميل البيانات...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>

const sheetURL = "https://script.google.com/macros/s/AKfycbypM94eQdFgV8zOYvvzg52I1bNFfR84hPr4jFtKTlIPT11Lkbloj-Q3eWfzHmATVlBMWw/exec";

let allData = [];
let selectedRow = null;

/* 🔥 أهم إصلاح في حياتك */
function normalizeCourse(course) {
  if (!course) return "unknown";

  return course
    .toString()
    .toLowerCase()
    .replace(/[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu, "") // حذف الإيموجي
    .replace(/\s+/g, "") // حذف الفراغات
    .trim();
}

/* تحويل إلى اسم واضح */
function courseLabel(key) {

  const map = {
    "scratch": "Scratch",
    "python": "Python",
    "روبوتيك": "روبوتيك",
    "ذكاءاصطناعي": "ذكاء اصطناعي"
  };

  return map[key] || key;
}

function updateStats(data) {

  document.getElementById("total").innerText =
    "👥 عدد المسجلين: " + data.length;

  let counts = {};

  data.forEach(row => {

    let key = normalizeCourse(row.course);

    if (!counts[key]) counts[key] = 0;
    counts[key]++;
  });

  let container = document.getElementById("coursesStats");
  container.innerHTML = "";

  Object.keys(counts).forEach(k => {

    let badge = document.createElement("div");
    badge.className = "badge";

    badge.innerText = `${courseLabel(k)}: ${counts[k]}`;

    container.appendChild(badge);
  });
}

async function loadData() {
  const res = await fetch(sheetURL);
  const data = await res.json();

  document.getElementById("loading").style.display = "none";

  allData = data;

  updateStats(data);
  renderTable(data);
}

function renderTable(data) {
  const table = document.getElementById("dataTable");

  table.innerHTML = `
    <tr>
      <th>🆔</th>
      <th>👦 الاسم</th>
      <th>🎂 العمر</th>
      <th>📱 الهاتف</th>
      <th>📚 الدورة</th>
      <th>📅 التاريخ</th>
    </tr>
  `;

  data.forEach(row => {

    const tr = document.createElement("tr");

    tr.onclick = () => {
      document.querySelectorAll("tr").forEach(r => r.classList.remove("selected"));
      tr.classList.add("selected");
      selectedRow = row;
    };

    tr.innerHTML = `
      <td>${row.id || ""}</td>
      <td>${row.name || ""}</td>
      <td>${row.age || ""}</td>
      <td>${row.phone || ""}</td>
      <td>${row.course || ""}</td>
      <td>${row.date || ""}</td>
    `;

    table.appendChild(tr);
  });
}

loadData();

</script>

</body>
</html>
