<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<style>
body {
  font-family: 'Cairo', sans-serif;
  margin: 0;
  background: #f5f7fa;
  direction: rtl;
}

.header {
  background: #007bff;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
}

.container {
  padding: 20px;
}

/* أدوات التحكم */
.tools {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

.tools input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  flex: 1;
}

.tools button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
}

.add { background: #28a745; }
.edit { background: #ffc107; color: black; }
.delete { background: #dc3545; }

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

th {
  background: #007bff;
  color: white;
}

tr:hover {
  background: #f1f1f1;
}

.selected {
  background: #d1ecf1 !important;
}

.loading {
  text-align: center;
  padding: 15px;
  color: gray;
}

.count {
  margin-bottom: 10px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="header">
  📊 لوحة التحكم أكاديمية وضاح للعلوم
</div>

<div class="container">

  <!-- عدد المسجلين -->
  <div class="count" id="count">👥 عدد المسجلين: 0</div>

  <!-- أدوات -->
  <div class="tools">
    <input type="text" id="search" placeholder="🔍 بحث بالاسم أو الرقم ID">
    <button class="add" onclick="addStudent()">➕ إضافة</button>
    <button class="edit" onclick="editStudent()">✏️ تعديل</button>
    <button class="delete" onclick="deleteStudent()">🗑️ حذف</button>
  </div>

  <table id="dataTable">
    <tr>
      <th>🆔</th>
      <th>👦 الاسم</th>
      <th>🎂 العمر</th>
      <th>📱 الهاتف</th>
      <th>📚 الدورة</th>
      <th>📅 التاريخ</th>
    </tr>
  </table>

  <div class="loading" id="loading">⏳ جاري تحميل البيانات...</div>

</div>

<script>

const sheetURL = "https://script.google.com/macros/s/AKfycbw4Uwp3sG1nLDt8_LkEKRzuqhUKiWZ8Aoiy8oHmJmFxRF6AWhdPn7EAfR9HtWPdsDr4GA/exec";

let allData = [];
let selectedRow = null;

async function loadData() {
  try {

    const res = await fetch(sheetURL);
    const data = await res.json();

    document.getElementById("loading").style.display = "none";

    allData = data;

    // عدد المسجلين
    document.getElementById("count").innerText =
      "👥 عدد المسجلين: " + data.length;

    renderTable(data);

  } catch (err) {
    console.log(err);
    document.getElementById("loading").innerHTML =
      "❌ خطأ في الاتصال بالسيرفر";
  }
}

function renderTable(data) {
  const table = document.getElementById("dataTable");

  table.innerHTML = `
    <tr>
      <th>🆔</th>
      <th>👦 الاسم</th>
      <th>🎂 العمر</th>
      <th>📱 الهاتف</th>
      <th>📚 الدورة</th>
      <th>📅 التاريخ</th>
    </tr>
  `;

  data.forEach((row) => {

    const tr = document.createElement("tr");

    tr.onclick = () => {
      document.querySelectorAll("tr").forEach(r => r.classList.remove("selected"));
      tr.classList.add("selected");
      selectedRow = row;
    };

    tr.innerHTML = `
      <td>${row.id || ""}</td>
      <td>${row.name || ""}</td>
      <td>${row.age || ""}</td>
      <td>${row.phone || ""}</td>
      <td>${row.course || ""}</td>
      <td>${row.date || ""}</td>
    `;

    table.appendChild(tr);
  });
}

/* 🔍 البحث */
document.getElementById("search").addEventListener("input", function() {
  let val = this.value.toLowerCase();

  let filtered = allData.filter(r =>
    (r.name && r.name.toLowerCase().includes(val)) ||
    (r.id && r.id.toLowerCase().includes(val))
  );

  renderTable(filtered);
});

/* ➕ إضافة */
function addStudent() {

  let name = prompt("اسم الطفل:");
  let age = prompt("العمر:");
  let phone = prompt("الهاتف:");
  let course = prompt("الدورة:");

  if (!name) return;

  fetch(sheetURL, {
    method: "POST",
    mode: "no-cors", // 🔥 الحل
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({name, age, phone, course})
  }).then(() => {
    setTimeout(loadData, 1000);
  });
}

/* ✏️ تعديل */
function editStudent() {

  if (!selectedRow) return alert("اختر طالب");

  let name = prompt("اسم الطفل:", selectedRow.name);
  let age = prompt("العمر:", selectedRow.age);
  let phone = prompt("الهاتف:", selectedRow.phone);
  let course = prompt("الدورة:", selectedRow.course);

  fetch(sheetURL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      action: "edit",
      id: selectedRow.id,
      name, age, phone, course
    })
  }).then(() => {
    setTimeout(loadData, 1000);
  });
}

/* 🗑️ حذف */
function deleteStudent() {

  if (!selectedRow) return alert("اختر طالب");

  if (!confirm("هل تريد الحذف؟")) return;

  fetch(sheetURL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      action: "delete",
      id: selectedRow.id
    })
  }).then(() => {
    setTimeout(loadData, 1000);
  });
}

loadData();

</script>

</body>
</html>
