<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<style>
body {
  font-family: 'Cairo', sans-serif;
  margin: 0;
  background: #f5f7fa;
  direction: rtl;
}

.header {
  background: #007bff;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
  position: relative;
}

.logout-btn {
  position: absolute;
  left: 15px;
  top: 15px;
  background: #dc3545;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.container {
  padding: 20px;
}

.count {
  margin-bottom: 15px;
  font-weight: bold;
}

.badges {
  margin-top: 8px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.badge {
  background: #007bff;
  color: white;
  padding: 5px 10px;
  border-radius: 20px;
  font-size: 13px;
}

.tools {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
  flex-wrap: wrap;
}

.tools input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  flex: 1;
}

.tools button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  color: white;
}

.add { background: #28a745; }
.edit { background: #ffc107; color: black; }
.delete { background: #dc3545; }
.excel { background: #17a2b8; }

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 10px;
  overflow: hidden;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #eee;
  text-align: center;
}

th {
  background: #007bff;
  color: white;
}

.selected {
  background: #d1ecf1 !important;
}

.loading {
  text-align: center;
  padding: 15px;
  color: gray;
}
</style>

</head>

<body>

<div class="header">
  📊 لوحة التحكم أكاديمية وضاح للعلوم
  <button class="logout-btn" onclick="logout()">🚪 خروج</button>
</div>

<div class="container">

  <div class="count">
    <div id="total">👥 عدد المسجلين: 0</div>
    <div class="badges" id="coursesStats"></div>
  </div>

  <div class="tools">
    <input type="text" id="search" placeholder="🔍 بحث بالاسم أو الرقم ID">

    <button class="add" onclick="addStudent()">➕ إضافة</button>
    <button class="edit" onclick="editStudent()">✏️ تعديل</button>
    <button class="delete" onclick="deleteStudent()">🗑️ حذف</button>

    <button class="excel" onclick="exportAll()">⬇️ Excel الكل</button>
    <button class="excel" onclick="exportByCourse()">🎯 Excel حسب الدورة</button>
  </div>

  <table id="dataTable">
    <tr>
      <th>🆔</th>
      <th>👦 الاسم</th>
      <th>🎂 العمر</th>
      <th>📱 الهاتف</th>
      <th>📚 الدورة</th>
      <th>📅 التاريخ</th>
    </tr>
  </table>

  <div class="loading" id="loading">⏳ جاري تحميل البيانات...</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>

if (!localStorage.getItem("role")) {
  window.location.href = "index.html";
}

const sheetURL = "https://script.google.com/macros/s/AKfycbypM94eQdFgV8zOYvvzg52I1bNFfR84hPr4jFtKTlIPT11Lkbloj-Q3eWfzHmATVlBMWw/exec";

let allData = [];
let selectedRow = null;

function logout() {
  localStorage.removeItem("role");
  window.location.href = "index.html";
}

async function loadData() {
  const res = await fetch(sheetURL);
  const data = await res.json();

  document.getElementById("loading").style.display = "none";

  allData = data;

  updateStats(data);
  renderTable(data);
}

/* 🔥 إحصائيات */
function updateStats(data) {

  document.getElementById("total").innerText =
    "👥 عدد المسجلين: " + data.length;

  let courseCounts = {};

  data.forEach(row => {
    let course = row.course || "غير محدد";

    if (!courseCounts[course]) courseCounts[course] = 0;
    courseCounts[course]++;
  });

  let container = document.getElementById("coursesStats");
  container.innerHTML = "";

  for (let c in courseCounts) {
    let badge = document.createElement("div");
    badge.className = "badge";
    badge.innerText = `${c}: ${courseCounts[c]}`;
    container.appendChild(badge);
  }
}

function renderTable(data) {
  const table = document.getElementById("dataTable");

  table.innerHTML = `
    <tr>
      <th>🆔</th>
      <th>👦 الاسم</th>
      <th>🎂 العمر</th>
      <th>📱 الهاتف</th>
      <th>📚 الدورة</th>
      <th>📅 التاريخ</th>
    </tr>
  `;

  data.forEach(row => {
    const tr = document.createElement("tr");

    tr.onclick = () => {
      document.querySelectorAll("tr").forEach(r => r.classList.remove("selected"));
      tr.classList.add("selected");
      selectedRow = row;
    };

    tr.innerHTML = `
      <td>${row.id || ""}</td>
      <td>${row.name || ""}</td>
      <td>${row.age || ""}</td>
      <td>${row.phone || ""}</td>
      <td>${row.course || ""}</td>
      <td>${row.date || ""}</td>
    `;

    table.appendChild(tr);
  });
}

/* 🔍 بحث */
document.getElementById("search").addEventListener("input", function() {
  let val = this.value.toLowerCase();

  let filtered = allData.filter(r =>
    (r.name && r.name.toLowerCase().includes(val)) ||
    (r.id && r.id.toLowerCase().includes(val))
  );

  renderTable(filtered);
});

/* 📥 تصدير الكل */
function exportAll() {
  let wb = XLSX.utils.json_to_book(allData, {sheet: "All"});
  XLSX.writeFile(wb, "كل_الطلاب.xlsx");
}

/* 🎯 تصدير حسب الدورة */
function exportByCourse() {

  let courses = [...new Set(allData.map(x => x.course).filter(Boolean))];

  let course = prompt("اكتب اسم الدورة:\n" + courses.join("\n"));

  if (!course) return;

  let filtered = allData.filter(x => x.course === course);

  if (filtered.length === 0) {
    alert("لا يوجد بيانات لهذه الدورة");
    return;
  }

  let wb = XLSX.utils.json_to_book(filtered, {sheet: course});
  XLSX.writeFile(wb, course + ".xlsx");
}

/* إضافة */
function addStudent() {
  let name = prompt("اسم الطفل:");
  let age = prompt("العمر:");
  let phone = prompt("الهاتف:");
  let course = prompt("الدورة:");

  fetch(sheetURL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({name, age, phone, course})
  }).then(() => setTimeout(loadData, 1000));
}

/* تعديل */
function editStudent() {
  if (!selectedRow) return alert("اختر طالب");

  let name = prompt("اسم الطفل:", selectedRow.name);
  let age = prompt("العمر:", selectedRow.age);
  let phone = prompt("الهاتف:", selectedRow.phone);
  let course = prompt("الدورة:", selectedRow.course);

  fetch(sheetURL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({
      action: "edit",
      id: selectedRow.id,
      name, age, phone, course
    })
  }).then(() => setTimeout(loadData, 1000));
}

/* حذف */
function deleteStudent() {
  if (!selectedRow) return alert("اختر طالب");

  if (!confirm("هل تريد الحذف؟")) return;

  fetch(sheetURL, {
    method: "POST",
    mode: "no-cors",
    body: JSON.stringify({
      action: "delete",
      id: selectedRow.id
    })
  }).then(() => setTimeout(loadData, 1000));
}

loadData();

</script>

</body>
</html>
