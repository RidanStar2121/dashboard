<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الدورات والمستويات الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #007bff;
            --primary-hover: #0056b3;
            --success-color: #28a745;
            --warning-color: #ffc107;
            --danger-color: #dc3545;
            --gray-bg: #f8f9fa;
            --text-main: #333;
            --border-color: #e2e8f0;
        }

        body { 
            font-family: 'Cairo', sans-serif; 
            margin: 0; 
            background: #f5f7fa; 
            direction: rtl; 
            color: var(--text-main);
        }

        /* الهيدر الاحترافي */
        .header { 
            background: linear-gradient(135deg, var(--primary-color), #0056b3); 
            color: white; 
            padding: 20px; 
            text-align: center; 
            position: relative; 
            font-size: 22px; 
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        
        .nav-btn { 
            position: absolute; 
            left: 20px; 
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2); 
            border: 1px solid rgba(255,255,255,0.4); 
            padding: 8px 20px; 
            border-radius: 30px; 
            color: white; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease; 
        }
        .nav-btn:hover { 
            background: white; 
            color: var(--primary-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }
        
        .container { padding: 30px 20px; max-width: 1200px; margin: auto; }
        
        /* فورم إضافة مادة جديدة بتصميم كروت راقٍ */
        .course-form { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); 
            margin-bottom: 35px; 
            border: 1px solid var(--border-color);
            position: relative;
        }
        
        .form-title { 
            font-size: 18px;
            font-weight: 700; 
            margin-bottom: 25px; 
            color: #1e293b; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }
        .form-title::after {
            content: '';
            flex: 1;
            height: 2px;
            background: var(--gray-bg);
        }
        
        /* شبكة المدخلات الذكية */
        .grid-inputs { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; 
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: bold;
            color: #64748b;
        }
        
        input, select { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color); 
            box-sizing: border-box; 
            font-family: 'Cairo'; 
            font-size: 14px; 
            background-color: #fdfdfd;
            transition: all 0.3s ease;
        }
        
        input:focus, select:focus { 
            border-color: var(--primary-color); 
            outline: none; 
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(0,123,255,0.15); 
        }
        
        /* الأزرار الاحترافية */
        .actions { 
            margin-top: 25px; 
            display: flex; 
            gap: 15px; 
            justify-content: flex-end;
        }
        
        button { 
            padding: 12px 30px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            font-family: 'Cairo'; 
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-add { 
            background: var(--success-color); 
            color: white; 
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.2);
        }

        .btn-add.edit-mode {
            background: #fd7e14;
            box-shadow: 0 4px 12px rgba(253, 126, 20, 0.2);
        }
        
        .btn-clear { 
            background: #e2e8f0; 
            color: #475569; 
        }
        
        button:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 6px 15px rgba(0,0,0,0.1);
        }
        button:active { transform: translateY(-1px); }

        /* حاوية الجدول الفاخرة */
        .table-container { 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.04); 
            border: 1px solid var(--border-color);
        }
        
        table { width: 100%; border-collapse: collapse; text-align: right; }
        thead { background: var(--gray-bg); border-bottom: 2px solid var(--border-color); }
        th { padding: 18px 20px; color: #475569; font-size: 14px; font-weight: 700; }
        td { padding: 18px 20px; border-bottom: 1px solid var(--border-color); font-size: 14px; color: #1e293b; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #f1f5f9; transition: background 0.2s ease; }
        
        /* أوسمة منسقة ومبهرة لجمالية العرض */
        .badge-price { 
            background: #e6f2ff; 
            color: var(--primary-color); 
            padding: 6px 14px; 
            border-radius: 30px; 
            font-weight: 700; 
            display: inline-block;
            border: 1px solid rgba(0,123,255,0.1);
        }

        .badge-level {
            background: #f1f5f9;
            color: #334155;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
        }

        .badge-sessions {
            background: #fef3c7;
            color: #d97706;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .td-actions {
            display: flex;
            gap: 6px;
            justify-content: center;
        }

        .btn-edit {
            color: #664d03;
            background: #fff3cd;
            border: 1px solid rgba(255,193,7,0.3);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Cairo';
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-edit:hover {
            background: var(--warning-color);
            color: #000;
            box-shadow: 0 4px 10px rgba(255,193,7,0.25);
        }

        .btn-delete { 
            color: var(--danger-color); 
            background: #fef2f2; 
            border: 1px solid rgba(220,53,69,0.2); 
            padding: 6px 12px; 
            border-radius: 8px; 
            cursor: pointer;
            font-size: 13px;
            font-family: 'Cairo';
            font-weight: 600;
            transition: 0.2s;
        }
        .btn-delete:hover { 
            background: var(--danger-color); 
            color: white; 
            box-shadow: 0 4px 10px rgba(220,53,69,0.2);
        }

        /* شاشة التحميل الذكية الـ Shimmer effect */
        .shimmer {
            animation: pulse 1.5s infinite ease-in-out;
            background: #eae9e9;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>

<div class="header">
    📚 نظام إدارة المواد والمستويات الدراسية الذكي
    <button class="nav-btn" onclick="location.href='home.html'">🏠 لوحة التحكم</button>
</div>

<div class="container">
    
    <div class="course-form">
        <div class="form-title" id="formTitle">✨ إضافة / تعديل دورة تعليمية ذكية</div>
        <div class="grid-inputs">
            <input type="hidden" id="courseID">
            
            <div class="input-group">
                <label>📖 اسم المادة الدراسية</label>
                <select id="courseName">
                    <option value="">اختر المادة الدراسية...</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>🎓 المستوى الدراسي</label>
                <select id="courseLevel">
                    <option value="">اختر المستوى التعليمي...</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>👤 الأستاذ المحاضر</label>
                <select id="courseTeacher">
                    <option value="">اختر الأستاذ من القائمة...</option>
                </select>
            </div>
            
            <div class="input-group">
                <label>💰 سعر الدورة (DA)</label>
                <input type="number" id="coursePrice" placeholder="مثال: 3500">
            </div>
            
            <div class="input-group">
                <label>📅 عدد الحصص إسبوعياً</label>
                <input type="text" id="courseSessions" placeholder="مثال: حصتين">
            </div>
            
            <div class="input-group">
                <label>⏳ مدة الحصة الواحدة</label>
                <input type="text" id="courseDuration" placeholder="مثال: ساعتان">
            </div>
        </div>
        
        <div class="actions">
            <button class="btn-clear" onclick="resetForm()">🧹 إفراغ الحقول</button>
            <button class="btn-add" id="btnSubmit" onclick="saveCourse()">💾 حفظ الدورة بنجاح</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width: 8%;">الكود</th>
                    <th>المادة</th>
                    <th>المستوى الدراسي</th>
                    <th>الأستاذ</th>
                    <th>سعر الاشتراك</th>
                    <th>الحصص</th>
                    <th>المدة الزمنية</th>
                    <th style="text-align: center; width: 18%;">إجراءات</th>
                </tr>
            </thead>
            <tbody id="coursesTableBody">
                <tr class="shimmer">
                    <td colspan="8" style="text-align:center; padding:40px; color:#64748b; font-weight: bold;">⏳ جاري الاتصال وجلب البيانات ...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const sheetURL = "https://script.google.com/macros/s/AKfycbx_OBq4qf1dfRwJJmDxymHME1QtYSFhUcKGPW773TNlRZ4GwRQdhyk_AoLDEYsYmPUq9g/exec";

    let localCoursesArray = [];

    window.onload = () => {
        loadDropdownData(); 
        loadCourses();      
    };

    // 1. جلب خيارات القوائم المنسدلة
    async function loadDropdownData() {
        try {
            const res = await fetch(`${sheetURL}?action=get&sheet=teachers`);
            const data = await res.json();
            const selectTeacher = document.getElementById("courseTeacher");
            if (Array.isArray(data)) {
                data.forEach(t => {
                    if (t.name) {
                        let opt = document.createElement("option");
                        opt.value = t.name; opt.textContent = t.name;
                        selectTeacher.appendChild(opt);
                    }
                });
            }
        } catch (e) { console.error("Error loading teachers"); }

        try {
            const res = await fetch(`${sheetURL}?action=get&sheet=subjects`); 
            const data = await res.json();
            const selectCourse = document.getElementById("courseName");
            if (Array.isArray(data)) {
                data.forEach(s => {
                    if(s.subject_name) {
                        let opt = document.createElement("option");
                        opt.value = s.subject_name; opt.textContent = s.subject_name;
                        selectCourse.appendChild(opt);
                    }
                });
            } else {
                fallbackDropdown("courseName", [
                    "إعلام آلي", "مكتبية", "بايثون", "جافا", "جافا سكريبت", "تصميم المواقع", "الأمن السبيراني", "الذكاء الصناعي", "سكراتش", "الروبوتيك",
                    "رياضيات", "فيزياء", "علوم طبيعية", "اللغة العربية", "اللغة الإنجليزية", "اللغة الفرنسية",
                    "فلسفة", "قرآن كريم", "خياطة", "طبخ", "تعليم الكتابة والخط"
                ]);
            }
        } catch (e) { 
            fallbackDropdown("courseName", [
                "إعلام آلي", "مكتبية", "بايثون", "جافا", "جافا سكريبت", "تصميم المواقع", "الأمن السبيراني", "الذكاء الصناعي", "سكراتش", "الروبوتيك",
                "رياضيات", "فيزياء", "علوم طبيعية", "اللغة العربية", "اللغة الإنجليزية", "اللغة الفرنسية",
                "فلسفة", "قرآن كريم", "خياطة", "طبخ", "تعليم الكتابة والخط"
            ]);
        }

        try {
            const res = await fetch(`${sheetURL}?action=get&sheet=levels`); 
            const data = await res.json();
            const selectLevel = document.getElementById("courseLevel");
            if (Array.isArray(data)) {
                data.forEach(l => {
                    if(l.level_name) {
                        let opt = document.createElement("option");
                        opt.value = l.level_name; opt.textContent = l.level_name;
                        selectLevel.appendChild(opt);
                    }
                });
            } else {
                fallbackDropdown("courseLevel", [
                    "1 إبتدائي", "2 إبتدائي", "3 إبتدائي", "4 إبتدائي", "5 إبتدائي",
                    "1 متوسط", "2 متوسط", "3 متوسط", "4 متوسط", 
                    "1 ثانوي", "2 ثانوي", "3 ثانوي (بكالوريا)"
  , "جميع المستويات"             ]);
            }
        } catch (e) {
            fallbackDropdown("courseLevel", [
                "1 إبتدائي", "2 إبتدائي", "3 إبتدائي", "4 إبتدائي", "5 إبتدائي",
                "1 متوسط", "2 متوسط", "3 متوسط", "4 متوسط", 
                "1 ثانوي", "2 ثانوي", "3 ثانوي (بكالوريا)"
  ,  "جميع المستويات"        ]);
        }
    }

    function fallbackDropdown(elementId, itemsArray) {
        const select = document.getElementById(elementId);
        itemsArray.forEach(item => {
            let opt = document.createElement("option");
            opt.value = item; opt.textContent = item;
            select.appendChild(opt);
        });
    }

    // 2. جلب وتنسيق الدورات
    async function loadCourses() {
        const tbody = document.getElementById("coursesTableBody");
        try {
            const res = await fetch(`${sheetURL}?action=get&sheet=courses`);
            const data = await res.json();
            tbody.innerHTML = "";
            
            localCoursesArray = Array.isArray(data) ? data : [];

            if (localCoursesArray.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding: 30px; color:#64748b;">📂 لا توجد دورات مسجلة حالياً</td></tr>';
                return;
            }

            localCoursesArray.forEach(c => {
                tbody.innerHTML += `
                    <tr>
                        <td style="color:#64748b; font-weight:600;">#${c.id || '-'}</td>
                        <td style="font-weight:700; color:#0f172a;">✨ ${c.course}</td>
                        <td><span class="badge-level">🎓 ${c.level}</span></td>
                        <td style="font-weight:600; color:#334155;">👤 ${c.teacher}</td>
                        <td><span class="badge-price">${c.price} DA</span></td>
                        <td><span class="badge-sessions">📅 ${c.sessions}</span></td>
                        <td style="color:#64748b;"><span style="font-size:12px;">⏳</span> ${c.duration}</td>
                        <td>
                            <div class="td-actions">
                                <button class="btn-edit" onclick="setupEditCourse('${c.id}')">✏️ تعديل</button>
                                <button class="btn-delete" onclick="deleteCourse('${c.id}')">🗑️ حذف</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
        } catch (e) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:var(--danger-color); font-weight:bold; padding:30px;">❌ فشل في مزامنة البيانات الحية. تأكد من إعدادات شيت الـ Google Sheets الخاص بك.</td></tr>';
        }
    }

    // وظيفة التحضير للتعديل
    function setupEditCourse(id) {
        const course = localCoursesArray.find(item => String(item.id) === String(id));
        if (!course) return;

        document.getElementById("courseID").value = course.id;
        document.getElementById("courseName").value = course.course || "";
        document.getElementById("courseLevel").value = course.level || "";
        document.getElementById("courseTeacher").value = course.teacher || "";
        document.getElementById("coursePrice").value = course.price || "";
        document.getElementById("courseSessions").value = course.sessions || "";
        document.getElementById("courseDuration").value = course.duration || "";

        document.getElementById("formTitle").textContent = "✏️ تعديل بيانات الدورة الحالية رقم #" + course.id;
        const btnSubmit = document.getElementById("btnSubmit");
        btnSubmit.textContent = "🔄 تحديث بيانات الدورة الآن";
        btnSubmit.classList.add("edit-mode");
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 3. حفظ بيانات دورة جديدة أو تحديث السطر الحالي
    async function saveCourse() {
        const idValue = document.getElementById("courseID").value;
        const isEdit = idValue !== "";

        const data = {
            action: isEdit ? "editStudent" : "addStudent", 
            sheet: "courses",
            id: idValue,
            course: document.getElementById("courseName").value,
            level: document.getElementById("courseLevel").value,
            teacher: document.getElementById("courseTeacher").value,
            price: document.getElementById("coursePrice").value,
            sessions: document.getElementById("courseSessions").value,
            duration: document.getElementById("courseDuration").value
        };

        if (!data.course || !data.level || !data.teacher) {
            return alert("⚠️ انتبه: يرجى اختيار (المادة، المستوى، والأستاذ) من القوائم المنسدلة أولاً.");
        }

        try {
            const btnSubmit = document.getElementById("btnSubmit");
            btnSubmit.textContent = "⏳ جاري المعالجة...";
            btnSubmit.style.opacity = "0.6";

            const res = await fetch(sheetURL, {
                method: "POST",
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (result.success) {
                alert(isEdit ? "✅ ممتاز! تم تحديث بيانات الدورة بنجاح." : "✅ رائع! تم إدراج وحفظ الدورة التعليمية الجديدة بنجاح.");
                resetForm();
                loadCourses();
            }
        } catch (e) { 
            alert("❌ حدث خطأ أثناء المزامنة السحابية."); 
        } finally {
            const btnSubmit = document.getElementById("btnSubmit");
            btnSubmit.style.opacity = "1";
            if (document.getElementById("courseID").value !== "") {
                btnSubmit.textContent = "🔄 تحديث بيانات الدورة الآن";
            } else {
                btnSubmit.textContent = "💾 حفظ الدورة بنجاح";
            }
        }
    }

    function resetForm() {
        const fields = ["courseID", "courseName", "courseLevel", "courseTeacher", "coursePrice", "courseSessions", "courseDuration"];
        fields.forEach(id => document.getElementById(id).value = "");
        
        document.getElementById("formTitle").textContent = "✨ إضافة / تعديل دورة تعليمية ذكية";
        const btnSubmit = document.getElementById("btnSubmit");
        btnSubmit.textContent = "💾 حفظ الدورة بنجاح";
        btnSubmit.classList.remove("edit-mode");
    }

    // 4. حذف دورة
    async function deleteCourse(id) {
        if (!confirm("🚨 هل أنت متأكد تماماً من حذف هذه الدورة من قاعدة البيانات؟")) return;
        
        const data = { action: "deleteStudent", sheet: "courses", id: id };
        try {
            const res = await fetch(sheetURL, { method: "POST", body: JSON.stringify(data) });
            const result = await res.json();
            if (result.success) {
                alert("🗑️ تم حذف الدورة وتحديث الجدول بنجاح.");
                if(document.getElementById("courseID").value === String(id)) {
                    resetForm();
                }
                loadCourses();
            }
        } catch (e) { alert("❌ عذراً، تعذر إتمام عملية الحذف."); }
    }
</script>

</body>
</html>
