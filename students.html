<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملفات الطلاب</title>

<style>

body{
  font-family:'Cairo',sans-serif;
  margin:0;
  background:#f5f7fa;
  direction:rtl;
}

/* HEADER */
.header{
  background:#007bff;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
  position:relative;
  font-weight:bold;
}

.home-btn{
  position:absolute;
  left:15px;
  top:15px;
  background:#dc3545;
  border:none;
  color:white;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

/* CONTAINER */
.container{
  padding:20px;
  max-width:1400px;
  margin:auto;
}

/* TOOLS */
.tools{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.tools input,
.tools select{
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
  flex:1;
  min-width:180px;
}

/* TABLE */
.table-container{
  overflow:auto;
  background:white;
  border-radius:15px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#007bff;
  color:white;
  padding:14px;
  font-size:14px;
}

td{
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:center;
  font-size:14px;
}

tr:hover{
  background:#f9fbff;
}

/* PHOTO */
.student-photo{
  width:55px;
  height:55px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #007bff;
}

/* BUTTONS */
.action-btn{
  border:none;
  padding:7px 10px;
  border-radius:8px;
  cursor:pointer;
  margin:2px;
  color:white;
  font-size:12px;
}

.edit{
  background:#ffc107;
  color:black;
}

.delete{
  background:#dc3545;
}

.card-btn{
  background:#17a2b8;
}

.print{
  background:#28a745;
}

.payment{
  background:#6f42c1;
}

.attendance{
  background:#fd7e14;
}

/* CARD MODAL & PHONE MODAL */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal-content{
  background:white;
  width:380px;
  border-radius:15px;
  padding:20px;
  text-align:center;
  position:relative;
}

.close{
  position:absolute;
  top:10px;
  left:10px;
  cursor:pointer;
  font-size:20px;
  z-index: 10;
}

/* LOADING */
.loading{
  text-align:center;
  color:gray;
  padding:20px;
}

/* BADGES */
.badge{
  padding:5px 10px;
  border-radius:20px;
  color:white;
  font-size:12px;
}

.male{
  background:#007bff;
}

.female{
  background:#e83e8c;
}

/* 🎯 تنسيقات احترافية لزر الهواتف والنافذة المنبثقة المخصصة للأرقام */
.show-phones-btn {
  background: #eef2f7;
  color: #007bff;
  border: 1px dashed #007bff;
  padding: 6px 12px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 13px;
  font-weight: bold;
  transition: all 0.3s;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

.show-phones-btn:hover {
  background: #007bff;
  color: white;
  border-style: solid;
}

.phone-modal-title {
  font-size: 16px;
  font-weight: bold;
  color: #333;
  margin-bottom: 15px;
  border-bottom: 2px solid #eee;
  padding-bottom: 8px;
}

.phone-list-box {
  display: flex;
  flex-direction: column;
  gap: 10px;
  text-align: right;
}

.phone-row-item {
  background: #f8fafc;
  padding: 10px 15px;
  border-radius: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid #edf2f7;
}

.phone-label {
  font-weight: bold;
  font-size: 13px;
}

.phone-number-link {
  color: #007bff;
  text-decoration: none;
  font-weight: bold;
  font-size: 14px;
}

.phone-number-link:hover {
  text-decoration: underline;
}

/* ==========================================
   🎯 التصميم الجديد الفاخر للبطاقة الذكية (ID / Visa Card Style)
   ========================================== */
.student-id-card {
  width: 340px;
  height: 215px;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  border-radius: 16px;
  position: relative;
  color: white;
  padding: 16px;
  box-sizing: border-box;
  text-align: right;
  overflow: hidden;
  box-shadow: 0 8px 25px rgba(0,0,0,0.25);
  margin: 10px auto;
  font-family: 'Cairo', sans-serif;
  direction: rtl;
}

/* تأثير لمعان الخلفية كالبطاقات البلاستيكية */
.student-id-card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
  pointer-events: none;
}

/* ترويسة البطاقة */
.card-header-zone {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.card-academy-title {
  font-size: 13px;
  font-weight: 900;
  letter-spacing: 0.5px;
  color: #f1c40f;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}

/* الرقاقة الذكية الشبيهة ببطاقة فيزا */
.card-chip {
  width: 32px;
  height: 24px;
  background: linear-gradient(135deg, #e0a96d, #966b37);
  border-radius: 4px;
  position: relative;
}
.card-chip::after {
  content: '';
  position: absolute;
  inset: 4px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 2px;
}

/* محتوى البطاقة الرئيسي */
.card-body-zone {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

/* حاوية الصورة */
.card-photo-box {
  position: relative;
}
.card-photo-box img {
  width: 75px;
  height: 75px;
  border-radius: 12px;
  object-fit: cover;
  border: 2px solid #fff;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

/* حقول البيانات */
.card-details-box {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

.card-row-name {
  font-size: 15px;
  font-weight: bold;
  color: #ffffff;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-row-data {
  font-size: 11px;
  color: #dfe6e9;
  display: flex;
  align-items: center;
  gap: 4px;
}
.card-row-data strong {
  color: #f1c40f;
}

/* الجزء السفلي: الكود الشريطي والباركود والمعرف */
.card-footer-zone {
  position: absolute;
  bottom: 12px;
  left: 16px;
  right: 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.card-id-display {
  font-size: 13px;
  font-weight: bold;
  letter-spacing: 1px;
  color: #fff;
  background: rgba(255,255,255,0.1);
  padding: 2px 8px;
  border-radius: 4px;
}

/* حاوية الـ QR كصورة آمنة للطباعة والحفظ */
.card-qr-box img {
  width: 55px;
  height: 55px;
  background: white;
  padding: 3px;
  border-radius: 6px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.2);
}

/* أزرار التحكم بالبطاقة */
.card-actions-wrapper {
  margin-top: 15px;
  display: flex;
  gap: 10px;
  justify-content: center;
}
.download-img-btn {
  background: #28a745;
  color: white;
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  font-weight: bold;
  cursor: pointer;
  font-size: 13px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.download-img-btn:hover {
  background: #218838;
}

</style>
</head>

<body>

<div class="header">
👨‍🎓 ملفات الطلاب

<button class="home-btn" onclick="goHome()">🏠 الرئيسية</button>
</div>

<div class="container">

<div class="tools">

<input type="text" id="search" placeholder="🔍 بحث بالاسم أو ID">

<select id="filterCourse">
<option value="">📚 كل الدورات</option>
</select>

<select id="filterGender">
<option value="">👦 الجنس</option>
<option value="ذكر">ذكر</option>
<option value="أنثى">أنثى</option>
</select>

</div>

<div class="table-container">

<table id="studentsTable">

<tr>
<th>📷</th>
<th>🆔</th>
<th>👦 الاسم</th>
<th>📱 الهاتف</th>
<th>📚 الدورة</th>
<th>👨‍🏫 الأستاذ</th>
<th>⚧ الجنس</th>
<th>⚙ العمليات</th>
</tr>

</table>

</div>

<div class="loading" id="loading">
⏳ جاري تحميل بيانات الطلاب...
</div>

</div>

<div class="modal" id="cardModal">

<div class="modal-content" style="width: 390px; background: #f8fafc;">

<div class="close" onclick="closeCard()">❌</div>

<div id="cardContent"></div>

<div class="card-actions-wrapper">
  <button class="download-img-btn" id="btnDownloadCard">📥 تحميل كصورة</button>
</div>

</div>

</div>

<div class="modal" id="phonesModal">

<div class="modal-content" style="width: 360px;">

<div class="close" onclick="closePhonesModal()">❌</div>

<div class="phone-modal-title">📞 هواتف الاتصال بالعائلة</div>

<div id="phonesModalContent" class="phone-list-box"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

/* =========================
   إعدادات
========================= */

const sheetURL = "https://script.google.com/macros/s/AKfycbzQpncmEbFRwd3N5nwHS911q5oMyqonKgIJKUqNMvkxKCRwDhFzgg8N-YozLMKiWkZaMg/exec";

let allStudents = [];

/* =========================
   تحميل البيانات
========================= */

async function loadStudents(){

  try{

    const res = await fetch(sheetURL + "?sheet=students");

    const data = await res.json();

    allStudents = data;

    document.getElementById("loading").style.display = "none";

    renderStudents(allStudents);

    loadCourses();

  }catch(err){

    console.error(err);

    document.getElementById("loading").innerHTML =
    "❌ خطأ في تحميل البيانات";

  }

}

/* =========================
   عرض الطلاب
========================= */
function renderStudents(data){

  const table = document.getElementById("studentsTable");

  table.innerHTML = `
  <tr>
    <th>📷</th>
    <th>🆔</th>
    <th>👦 الاسم</th>
    <th>🎂 تاريخ الميلاد</th>
    <th>📘 المستوى</th>
    <th>📱 هواتف العائلة</th>
    <th>📚 الدورة</th>
    <th>👨‍🏫 الأستاذ</th>
    <th>⚧ الجنس</th>
    <th>⚙ العمليات</th>
  </tr>
  `;

  data.forEach(student => {

    const tr = document.createElement("tr");

    let genderBadge =
      student.gender === "أنثى"
      ? `<span class="badge female">أنثى</span>`
      : `<span class="badge male">ذكر</span>`;

let birthDate = "";

if(student.birth){

  birthDate =
  new Date(student.birth)
  .toLocaleDateString("fr-CA");

}

    let displayPhonesHTML = "";
    if (student.phone && student.phone.toString().trim() !== "") {
        displayPhonesHTML = `<button class="show-phones-btn" onclick="openPhonesModal('${student.id}')">📞 إضغط لعرض الأرقام</button>`;
    } else {
        displayPhonesHTML = `<span style="color:#999; font-size:13px;">🚫 لا يوجد رقم</span>`;
    }

    tr.innerHTML = `

      <td>
        <img class="student-photo"
        src="${student.photo || 'https://via.placeholder.com/80'}">
      </td>

      <td>${student.id || ""}</td>

      <td>${student.name || ""}</td>

      <td>${birthDate}</td>

      <td>${student.level || ""}</td>

      <td>${displayPhonesHTML}</td>

      <td>${student.course || ""}</td>

      <td>${student.teacher || ""}</td>

      <td>${genderBadge}</td>

      <td>

        <button class="action-btn edit"
        onclick='editStudentById("${student.id}")'>
        ✏️
        </button>

        <button class="action-btn delete"
        onclick='deleteStudent("${student.id}")'>
        🗑️
        </button>

        <button class="action-btn card-btn"
        onclick='showCardById("${student.id}")'>
        🎴
        </button>

        <button class="action-btn print"
        onclick='printCardById("${student.id}")'>
        🖨️
        </button>

        <button class="action-btn payment"
        onclick="goToPayments('${student.id}', '${encodeURIComponent(student.name)}')">
        💰
        </button>

        <button class="action-btn attendance"
        onclick="goToAttendance('${student.id}', '${encodeURIComponent(student.name)}')">
        🕒
        </button>

      </td>
    `;

    table.appendChild(tr);

  });

}


function getStudentById(id){

  return allStudents.find(
    x => String(x.id) === String(id)
  );

}



/* =========================
   تعديل
========================= */

function editStudentById(id){

  const student = getStudentById(id);

  if(!student){
    alert("❌ الطالب غير موجود");
    return;
  }

  localStorage.setItem(
    "editStudent",
    JSON.stringify(student)
  );

  window.location.href = "add.html";

}



/* =========================
   عرض البطاقة
========================= */

function showCardById(id){

  const student = getStudentById(id);

  if(!student){
    alert("❌ الطالب غير موجود");
    return;
  }

  showCard(student);

}



/* =========================
   طباعة البطاقة
========================= */

function printCardById(id){

  const student = getStudentById(id);

  if(!student){
    alert("❌ الطالب غير موجود");
    return;
  }

  printCard(student);

}





/* =========================
   تحميل الدورات
========================= */

function loadCourses(){

  let courses = [...new Set(
    allStudents.map(x => x.course).filter(Boolean)
  )];

  let select = document.getElementById("filterCourse");

  courses.forEach(c => {

    let op = document.createElement("option");

    op.value = c;
    op.textContent = c;

    select.appendChild(op);

  });

}

/* =========================
   البحث
========================= */

document.getElementById("search")
.addEventListener("input", applyFilters);

document.getElementById("filterCourse")
.addEventListener("change", applyFilters);

document.getElementById("filterGender")
.addEventListener("change", applyFilters);

function applyFilters(){

  let search =
    document.getElementById("search")
    .value.toLowerCase();

  let course =
    document.getElementById("filterCourse").value;

  let gender =
    document.getElementById("filterGender").value;

  let filtered = allStudents.filter(x => {

    let okSearch =
      (x.name || "").toLowerCase().includes(search) ||
      (x.id || "").toLowerCase().includes(search);

    let okCourse =
      !course || x.course === course;

    let okGender =
      !gender || x.gender === gender;

    return okSearch && okCourse && okGender;

  });

  renderStudents(filtered);

}

/* =========================
   تعديل
========================= */

function editStudent(student){

  localStorage.setItem(
    "editStudent",
    JSON.stringify(student)
  );

  window.location.href = "add_student.html";

}

/* =========================
   حذف
========================= */

function deleteStudent(id){

  if(!confirm("هل تريد حذف الطالب؟")) return;

  fetch(sheetURL,{
    method:"POST",
    body:JSON.stringify({
      action:"deleteStudent",
      id:id
    })
  })
  .then(r => r.text())
  .then(() => {

    alert("✅ تم حذف الطالب");

    loadStudents();

  });

}

/* =======================================================
   🎯 دوال النافذة المنبثقة الذكية لعرض وإدارة أرقام هواتف العائلة
========================================================== */
function openPhonesModal(id) {
  const student = getStudentById(id);
  if (!student || !student.phone) return;

  const phonesArr = student.phone.toString().split(/\s*\/\s*/);
  const container = document.getElementById("phonesModalContent");
  
  let html = "";
  let hasValidData = false;

  if (phonesArr[0] && phonesArr[0].trim() !== "") {
    html += `
      <div class="phone-row-item">
        <span class="phone-label" style="color:#007bff;">📱 هاتف الطالب:</span>
        <a class="phone-number-link" href="tel:${phonesArr[0].trim()}">${phonesArr[0].trim()}</a>
      </div>`;
    hasValidData = true;
  }
  if (phonesArr[1] && phonesArr[1].trim() !== "") {
    html += `
      <div class="phone-row-item">
        <span class="phone-label" style="color:#28a745;">👨 هاتف الولي:</span>
        <a class="phone-number-link" href="tel:${phonesArr[1].trim()}">${phonesArr[1].trim()}</a>
      </div>`;
    hasValidData = true;
  }
  if (phonesArr[2] && phonesArr[2].trim() !== "") {
    html += `
      <div class="phone-row-item">
        <span class="phone-label" style="color:#e83e8c;">👩 هاتف الأم:</span>
        <a class="phone-number-link" href="tel:${phonesArr[2].trim()}">${phonesArr[2].trim()}</a>
      </div>`;
    hasValidData = true;
  }

  if (!hasValidData) {
    html += `
      <div class="phone-row-item">
        <span class="phone-label" style="color:#007bff;">📱 هاتف الطالب:</span>
        <a class="phone-number-link" href="tel:${student.phone.toString().trim()}">${student.phone.toString().trim()}</a>
      </div>`;
  }

  container.innerHTML = html;
  document.getElementById("phonesModal").style.display = "flex";
}

function closePhonesModal() {
  document.getElementById("phonesModal").style.display = "none";
}

/* =======================================================
   🎯 بناء وعرض وتوليد البطاقة الذكية الفاخرة (ID Card Style)
========================================================== */
function showCard(student){

  const modal = document.getElementById("cardModal");
  const cardContainer = document.getElementById("cardContent");

  modal.style.display = "flex";

  // إعداد حقل تاريخ الميلاد
  let birthDate = student.birth || "";
  if(student.birth && !isNaN(Date.parse(student.birth))){
    birthDate = new Date(student.birth).toLocaleDateString("fr-CA");
  }

  // صياغة البنية الفاخرة المحدثة كلياً للبطاقة الذكية
  cardContainer.innerHTML = `
    <div class="student-id-card" id="studentTargetCard">
      
      <div class="card-header-zone">
        <span class="card-academy-title">STUDENT ID CARD</span>
        <div class="card-chip"></div>
      </div>

      <div class="card-body-zone">
        <div class="card-photo-box">
          <img src="${student.photo || 'https://via.placeholder.com/80'}" crossorigin="anonymous">
        </div>
        
        <div class="card-details-box">
          <div class="card-row-name">${student.name || ""}</div>
          <div class="card-row-data"><strong>الدورة:</strong> ${student.course || "غير محدد"}</div>
          <div class="card-row-data"><strong>المستوى:</strong> ${student.level || "غير محدد"}</div>
          <div class="card-row-data"><strong>الميلاد:</strong> ${birthDate}</div>
          <div class="card-row-data"><strong>الأستاذ:</strong> ${student.teacher || "غير محدد"}</div>
        </div>
      </div>

      <div class="card-footer-zone">
        <div class="card-id-display">ID: ${student.id || "0000"}</div>
        <div class="card-qr-box" id="qrTargetBox">
            <canvas id="hiddenQrCanvas" style="display:none;"></canvas>
        </div>
      </div>

    </div>
  `;

  // 🎯 الحل الجذري: توليد الكود الشريطي أولاً على كانفاس مخفي ثم تحويله فوراً لـ Image حقيقية
  setTimeout(() => {
      const canvas = document.getElementById("hiddenQrCanvas");
      if (canvas) {
          QRCode.toCanvas(canvas, String(student.id || student.name), { width: 120, margin: 1 }, function (error) {
              if (!error) {
                  const qrImageSrc = canvas.toDataURL("image/png");
                  const qrBox = document.getElementById("qrTargetBox");
                  if (qrBox) {
                      qrBox.innerHTML = `<img src="${qrImageSrc}" alt="QR Code">`;
                  }
              }
          });
      }
  }, 50);

  // ربط حدث زر التخزين كصورة وتمرير اسم الطالب لحفظ الملف باسمه الشخصي
  document.getElementById("btnDownloadCard").onclick = function() {
      downloadCardAsImage(student.name || "student_card");
  };
}

/* 🎯 دالة سحرية لالتقاط البطاقة بالكامل وتنزيلها كملف PNG ممتاز عالي الدقة */
function downloadCardAsImage(studentName) {
  const cardElement = document.getElementById("studentTargetCard");
  
  // تشغيل المحرك المتقدم لالتقاط الشاشة البرمجية مع دعم الصور الخارجية المتقاطعة النطاق
  html2canvas(cardElement, {
      useCORS: true,
      allowTaint: true,
      scale: 2, // رفع دقة ووضوح الصورة المخرجة مرتين
      backgroundColor: null
  }).then(canvas => {
      const imageURL = canvas.toDataURL("image/png");
      const downloadLink = document.createElement("a");
      downloadLink.href = imageURL;
      downloadLink.download = `بطاقة_الطالب_${studentName}.png`;
      document.body.appendChild(downloadLink);
      downloadLink.click();
      document.body.removeChild(downloadLink);
  }).catch(err => {
      console.error("خطأ أثناء حفظ الصورة:", err);
      alert("⚠️ تعذر حفظ البطاقة كصورة بسبب إعدادات حماية الأمان لروابط الصور الخارجية.");
  });
}
